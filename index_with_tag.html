<script>
const translations = {
  es: {
    slogan: "Aire Fresco, Tejidos Limpios, Decisiones Claras",
    services: [
      ["Limpieza de Aire Acondicionado", "Desde 40 € por unidad. Envíe fotos para una cotización precisa."],
      ["Limpieza de Ventanas", "Desde 30 €. Utilizamos equipos especiales para resultados cristalinos."],
      ["Limpieza de Tejidos", "Desde 50 €. Sofás, alfombras, colchones. Proceso profundo de extracción."],
      ["Servicios de Manitas", "Desde 30 €. Ayuda con tareas como colgar estanterías o lámparas."],
      ["Inspección de Propiedades", "Desde 50 €. Revisiones presenciales o por video. Ideal para ventas."]
    ],
    faqTitle: "Preguntas Frecuentes",
    faqs: [
      ["¿Cuánto dura una limpieza?", "Normalmente de 1 a 3 horas."],
      ["¿Qué métodos de pago aceptan?", "Solo efectivo. Próximamente Bizum y transferencias."],
      ["¿Ofrecen inspecciones remotas?", "¡Sí! Podemos realizarlas por video."]
    ],
    subscribeButton: "Suscribirse",
    thankyou: "¡Gracias! Hemos recibido tu mensaje."
  },
  en: {
    slogan: "Fresh Air, Clean Fabrics, Clear Decisions",
    services: [
      ["Air Conditioning Cleaning", "From €40 per unit. Send photos for an accurate quote."],
      ["Window Cleaning", "From €30. We use special tools for crystal clear results."],
      ["Fabric Cleaning", "From €50. Deep cleaning for sofas, carpets, and mattresses."],
      ["Handyman Services", "From €30. Help with tasks like hanging shelves or lights."],
      ["Property Inspection", "From €50. In-person or video inspections for sales or rentals."]
    ],
    faqTitle: "Frequently Asked Questions",
    faqs: [
      ["How long does a cleaning take?", "Usually 1 to 3 hours."],
      ["What payment methods do you accept?", "Cash only. Bizum and bank transfers coming soon."],
      ["Do you offer remote inspections?", "Yes! We can do video inspections."]
    ],
    subscribeTitle: "Subscribe to Our Offers",
    subscribeButton: "Subscribe",
    thankyou: "Thank you! We've received your message."
  }
};

function switchLang(lang) {
  document.getElementById("slogan").textContent = translations[lang].slogan;
  const titles = document.querySelectorAll(".service h3");
  const descriptions = document.querySelectorAll(".service p");
  translations[lang].services.forEach((s, i) => {
    if (titles[i]) titles[i].textContent = s[0];
    if (descriptions[i]) descriptions[i].textContent = s[1];
  });
  document.getElementById("faqTitle").textContent = translations[lang].faqTitle;
  const q = document.querySelectorAll(".faq h3");
  const a = document.querySelectorAll(".faq p.faq-answer");
  translations[lang].faqs.forEach((faq, i) => {
    if (q[i]) q[i].textContent = faq[0];
    if (a[i]) a[i].textContent = faq[1];
  });
  document.getElementById("subTitle").textContent = translations[lang].subscribeTitle;
  document.getElementById("subscribeBtn").textContent = translations[lang].subscribeButton;
  document.querySelector("#thankYouMessage").textContent = translations[lang].thankyou;
}

document.addEventListener("DOMContentLoaded", () => switchLang("es"));
document.querySelector(".subscribe form").addEventListener("submit", function(e) {
  e.preventDefault();
  const form = this;
  fetch(form.action, {
    method: "POST",
    body: new FormData(form),
    headers: { 'Accept': 'application/json' }
  }).then(response => {
    if (response.ok) {
      document.getElementById("thankYouMessage").style.display = "block";
      form.reset();
    }
  });
});
</script>
